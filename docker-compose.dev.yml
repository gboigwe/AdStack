version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: adstack-frontend-dev
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3002
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - adstack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: adstack-backend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://adstack:adstack_dev@postgres:5432/adstack_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-do-not-use-in-production
      STACKS_API_URL: https://stacks-node-api.testnet.stacks.co
      STACKS_NETWORK: testnet
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx ts-node-dev --respawn --transpile-only server.ts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adstack-network

  websocket-server:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
      target: builder
    container_name: adstack-websocket-dev
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-do-not-use-in-production
      ALLOWED_ORIGINS: http://localhost:3001
    volumes:
      - ./websocket-server:/app
      - /app/node_modules
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - adstack-network

  postgres:
    image: postgres:16-alpine
    container_name: adstack-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: adstack_dev
      POSTGRES_USER: adstack
      POSTGRES_PASSWORD: adstack_dev
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adstack -d adstack_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adstack-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-dev-data:/data
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: adstack-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - adstack-network
    profiles:
      - debug

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: adstack-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@adstack.io
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - adstack-network
    profiles:
      - debug

volumes:
  postgres-dev-data:
    driver: local
  redis-dev-data:
    driver: local

networks:
  adstack-network:
    driver: bridge
