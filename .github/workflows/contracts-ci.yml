name: Contracts CI

on:
  push:
    branches: [master, main]
    paths:
      - 'contracts/**'
      - 'tests/**'
      - 'Clarinet.toml'
      - 'package.json'
  pull_request:
    branches: [master, main]
    paths:
      - 'contracts/**'
      - 'tests/**'
      - 'Clarinet.toml'
      - 'package.json'

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Clarinet Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        uses: hirosystems/clarinet-actions/setup@v1
        with:
          manifest-path: ./Clarinet.toml

      - name: Run clarinet check
        run: clarinet check

  test:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: coverage/
          retention-days: 14

  analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        uses: hirosystems/clarinet-actions/setup@v1
        with:
          manifest-path: ./Clarinet.toml

      - name: Run clarinet check with analysis
        run: clarinet check --enable-clarity-wasm
