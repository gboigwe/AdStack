server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: adstack-backend
          service: backend
          __path__: /var/log/adstack/backend/*.log

  - job_name: websocket
    static_configs:
      - targets:
          - localhost
        labels:
          job: adstack-websocket
          service: websocket
          __path__: /var/log/adstack/websocket/*.log

  - job_name: bridge-relayer
    static_configs:
      - targets:
          - localhost
        labels:
          job: adstack-bridge-relayer
          service: bridge-relayer
          __path__: /var/log/adstack/bridge-relayer/*.log

  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: adstack-nginx
          service: nginx
          __path__: /var/log/nginx/*.log

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=adstack"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
