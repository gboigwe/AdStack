services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: adstack-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - adstack-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: adstack-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - adstack-network

  loki:
    image: grafana/loki:2.9.5
    container_name: adstack-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/logging/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3200:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - adstack-network

  promtail:
    image: grafana/promtail:2.9.5
    container_name: adstack-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - adstack-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: adstack-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - adstack-network

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: adstack-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - adstack-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: adstack-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - adstack-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: adstack-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-adstack}:${POSTGRES_PASSWORD:-adstack}@postgres:5432/${POSTGRES_DB:-adstack}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - adstack-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: adstack-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    networks:
      - adstack-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  adstack-network:
    external: true
