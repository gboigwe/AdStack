version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adstack-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3000
      NEXT_PUBLIC_WS_URL: ws://websocket-server:3002
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adstack-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://adstack:${DB_PASSWORD:-adstack_secret}@postgres:5432/adstack_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      STACKS_API_URL: ${STACKS_API_URL:-https://stacks-node-api.testnet.stacks.co}
      STACKS_NETWORK: ${STACKS_NETWORK:-testnet}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      FRONTEND_URL: http://frontend:3001
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      EMAIL_API_KEY: ${EMAIL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-logs:/app/logs
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  websocket-server:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: adstack-websocket
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379
      STACKS_WS_URL: ${STACKS_WS_URL:-wss://stacks-node-api.testnet.stacks.co}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ws-logs:/app/logs
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bridge-relayer:
    build:
      context: ./bridge-relayer
      dockerfile: Dockerfile
    container_name: adstack-bridge-relayer
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://adstack:${DB_PASSWORD:-adstack_secret}@postgres:5432/adstack_db
      STACKS_API_URL: ${STACKS_API_URL:-https://stacks-node-api.testnet.stacks.co}
      STACKS_NETWORK: ${STACKS_NETWORK:-testnet}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - relayer-logs:/app/logs
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: adstack-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DATABASE_URL: postgresql://adstack:${DB_PASSWORD:-adstack_secret}@postgres:5432/adstack_db
      MODEL_PATH: /app/models/saved
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ml-models:/app/models/saved
      - ml-logs:/app/logs
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: adstack-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: adstack_db
      POSTGRES_USER: adstack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adstack_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adstack -d adstack_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: adstack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: adstack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - adstack-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  backend-logs:
    driver: local
  ws-logs:
    driver: local
  relayer-logs:
    driver: local
  ml-logs:
    driver: local
  ml-models:
    driver: local
  nginx-logs:
    driver: local

networks:
  adstack-network:
    driver: bridge
